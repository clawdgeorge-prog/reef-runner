<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Neon Snake">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle fill='%23ff00ff' cx='16' cy='16' r='12'/><circle fill='%2300ff88' cx='16' cy='16' r='6'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%230a0a0f' width='180' height='180' rx='30'/><circle fill='%23ff00ff' cx='90' cy='90' r='35'/><circle fill='%2300ff88' cx='90' cy='90' r='20'/></svg>">
    <title>Neon Snake</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            color: #fff;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(120, 0, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 255, 200, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 0, 100, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }
        
        h1 {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-bottom: 1rem;
            background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glow 3s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
        }
        
        @keyframes glow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .stats-bar {
            display: flex;
            gap: 2rem;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
        }
        
        .stat-label {
            color: #888;
            font-size: 0.8rem;
        }
        
        .stat-value {
            color: #00ffff;
            font-weight: 700;
            text-shadow: 0 0 10px #00ffff;
        }
        
        .lives {
            font-size: 1.5rem;
            letter-spacing: 0.2rem;
        }
        
        .game-container {
            position: relative;
            border: 3px solid #ff00ff;
            border-radius: 8px;
            box-shadow: 
                0 0 20px rgba(255, 0, 255, 0.5),
                inset 0 0 30px rgba(255, 0, 255, 0.1);
            background: rgba(0, 0, 0, 0.8);
        }
        
        canvas {
            display: block;
            border-radius: 5px;
        }
        
        .controls {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        button {
            font-family: 'Orbitron', monospace;
            font-size: 0.9rem;
            font-weight: 700;
            padding: 0.8rem 1.5rem;
            border: 2px solid;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.2s ease;
            background: transparent;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .btn-start {
            color: #00ff88;
            border-color: #00ff88;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }
        
        .btn-start:hover {
            background: rgba(0, 255, 136, 0.2);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.5);
        }
        
        .btn-easy { color: #00ff88; border-color: #00ff88; }
        .btn-medium { color: #ffff00; border-color: #ffff00; }
        .btn-hard { color: #ff8800; border-color: #ff8800; }
        .btn-nightmare { color: #ff0044; border-color: #ff0044; }
        
        .btn-easy.active, .btn-easy:hover { background: rgba(0, 255, 136, 0.2); box-shadow: 0 0 20px rgba(0, 255, 136, 0.4); }
        .btn-medium.active, .btn-medium:hover { background: rgba(255, 255, 0, 0.2); box-shadow: 0 0 20px rgba(255, 255, 0, 0.4); }
        .btn-hard.active, .btn-hard:hover { background: rgba(255, 136, 0, 0.2); box-shadow: 0 0 20px rgba(255, 136, 0, 0.4); }
        .btn-nightmare.active, .btn-nightmare:hover { background: rgba(255, 0, 68, 0.2); box-shadow: 0 0 20px rgba(255, 0, 68, 0.4); }
        
        .active {
            transform: scale(1.05);
        }
        
        .powerup-info {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            font-size: 0.75rem;
        }
        
        .powerup-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.6rem;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .powerup-icon {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .pause-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #ff00ff;
            text-shadow: 0 0 20px #ff00ff;
            border-radius: 5px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .pause-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .game-over-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .game-over-overlay h2 {
            font-size: 2.5rem;
            color: #ff0044;
            text-shadow: 0 0 20px #ff0044;
            margin-bottom: 1rem;
        }
        
        .game-over-overlay p {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
        }
        
        .instructions {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #666;
            text-align: center;
        }

        /* Mobile Touch Controls */
        .touch-controls {
            display: none;
            margin-top: 1rem;
            touch-action: manipulation;
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        .touch-dpad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 8px;
            justify-content: center;
        }

        .touch-btn {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            border: 2px solid rgba(255, 0, 255, 0.5);
            background: rgba(255, 0, 255, 0.1);
            color: #ff00ff;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .touch-btn:active {
            background: rgba(255, 0, 255, 0.3);
            transform: scale(0.95);
        }

        .touch-btn.empty {
            visibility: hidden;
        }

        /* Mobile Optimizations */
        @media (max-width: 768px), (max-height: 700px) {
            body {
                padding: 10px;
                min-height: 100vh;
                min-height: -webkit-fill-available;
                justify-content: flex-start;
                padding-top: env(safe-area-inset-top, 10px);
                padding-bottom: env(safe-area-inset-bottom, 10px);
            }

            h1 {
                font-size: 1.8rem;
                margin-bottom: 0.5rem;
                letter-spacing: 0.15em;
            }

            .stats-bar {
                gap: 1rem;
                margin-bottom: 0.5rem;
            }

            .stat {
                font-size: 0.85rem;
            }

            .stat-label {
                font-size: 0.65rem;
            }

            .lives {
                font-size: 1.2rem;
            }

            .game-container {
                border-width: 2px;
                border-radius: 6px;
            }

            canvas {
                width: 100%;
                max-width: 350px;
                height: auto;
            }

            .controls {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                width: min(100%, 350px);
                gap: 0.45rem;
                margin-top: 0.6rem;
            }

            .controls button {
                width: 100%;
                min-width: 0;
                font-size: 0.7rem;
                padding: 0.55rem 0.65rem;
                border-radius: 4px;
            }

            .controls #startBtn {
                grid-column: 1 / -1;
            }

            .powerup-info {
                display: none;
            }

            .instructions {
                font-size: 0.6rem;
                margin-top: 0.5rem;
            }

            /* Show touch controls on mobile */
            .touch-controls {
                display: block;
            }

            .instructions {
                display: none;
            }

            .pause-overlay {
                font-size: 2rem;
            }

            .game-over-overlay h2 {
                font-size: 1.8rem;
            }

            .game-over-overlay p {
                font-size: 1rem;
            }
        }

        @media (max-width: 400px) {
            h1 {
                font-size: 1.4rem;
            }

            canvas {
                max-width: min(300px, calc(100vw - 24px));
            }

            .controls {
                width: min(100%, 300px);
            }

            .controls button {
                font-size: 0.68rem;
                padding: 0.5rem 0.55rem;
            }

            .touch-btn {
                width: 54px;
                height: 54px;
                font-size: 1.35rem;
            }

            .touch-dpad {
                grid-template-columns: repeat(3, 54px);
                grid-template-rows: repeat(2, 54px);
                gap: 10px;
            }
        }

        /* Landscape mobile */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
            }

            h1 {
                width: 100%;
                font-size: 1.2rem;
                margin-bottom: 0.3rem;
            }

            .stats-bar {
                width: 100%;
                margin-bottom: 0.3rem;
            }

            .game-container {
                order: 3;
            }

            .controls {
                margin-top: 0;
            }

            .touch-controls {
                display: none;
            }

            .instructions {
                display: block;
                width: 100%;
                margin-top: 0.3rem;
            }
        }

        /* PWA standalone mode */
        @media (display-mode: standalone) {
            body {
                background: #0a0a0f;
            }
        }
    </style>
</head>
<body>
    <h1>Neon Snake</h1>
    
    <div class="stats-bar">
        <div class="stat">
            <span class="stat-label">LIVES</span>
            <span class="lives" id="lives">❤️❤️❤️</span>
        </div>
        <div class="stat">
            <span class="stat-label">SCORE</span>
            <span class="stat-value" id="score">0</span>
        </div>
        <div class="stat">
            <span class="stat-label">HIGH</span>
            <span class="stat-value" id="highScore">0</span>
        </div>
    </div>
    
    <div class="game-container">
        <canvas id="gameCanvas" width="600" height="600"></canvas>
        <div class="pause-overlay" id="pauseOverlay">⏸ PAUSED</div>
        <div class="game-over-overlay" id="gameOverOverlay">
            <h2>GAME OVER</h2>
            <p>Final Score: <span id="finalScore">0</span></p>
            <p>Press START to play again</p>
        </div>
    </div>
    
    <div class="controls">
        <button class="btn-start" id="startBtn">Start</button>
        <button class="btn-easy active" data-difficulty="easy" data-speed="150">Easy</button>
        <button class="btn-medium" data-difficulty="medium" data-speed="100">Medium</button>
        <button class="btn-hard" data-difficulty="hard" data-speed="70">Hard</button>
        <button class="btn-nightmare" data-difficulty="nightmare" data-speed="40">Nightmare</button>
    </div>
    
    <div class="powerup-info">
        <div class="powerup-item"><span class="powerup-icon" style="background:#00ffff;box-shadow:0 0 5px #00ffff"></span> Speed</div>
        <div class="powerup-item"><span class="powerup-icon" style="background:#ff00ff;box-shadow:0 0 5px #ff00ff"></span> Ghost</div>
        <div class="powerup-item"><span class="powerup-icon" style="background:#ffff00;box-shadow:0 0 5px #ffff00"></span> 2x Points</div>
        <div class="powerup-item"><span class="powerup-icon" style="background:#00ff88;box-shadow:0 0 5px #00ff88"></span> Slow</div>
        <div class="powerup-item"><span class="powerup-icon" style="background:#ff8800;box-shadow:0 0 5px #ff8800"></span> Shield</div>
    </div>
    
    <div class="instructions">
        Arrow Keys or WASD to move | P to Pause | Space to Start | Swipe or use the D-pad on phone
    </div>

    <!-- Mobile Touch Controls -->
    <div class="touch-controls">
        <div class="touch-dpad">
            <div class="touch-btn empty"></div>
            <div class="touch-btn" data-dir="up">▲</div>
            <div class="touch-btn empty"></div>
            <div class="touch-btn" data-dir="left">◀</div>
            <div class="touch-btn" data-dir="down">▼</div>
            <div class="touch-btn" data-dir="right">▶</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Audio context
        let audioCtx = null;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }
        
        function playSound(type) {
            if (!audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            switch(type) {
                case 'eat':
                    osc.frequency.setValueAtTime(800, now);
                    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                    break;
                case 'powerup':
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.setValueAtTime(600, now + 0.05);
                    osc.frequency.setValueAtTime(800, now + 0.1);
                    osc.frequency.setValueAtTime(1000, now + 0.15);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                    break;
                case 'die':
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
                case 'gameover':
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.setValueAtTime(200, now + 0.2);
                    osc.frequency.setValueAtTime(100, now + 0.4);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                    osc.start(now);
                    osc.stop(now + 0.6);
                    break;
            }
        }
        
        // Game state
        const GRID_SIZE = 20;
        const TILE_COUNT = canvas.width / GRID_SIZE;
        
        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = { x: 0, y: 0 };
        let powerups = [];
        let score = 0;
        const HIGH_SCORE_KEY = 'snakeHighScoresByDifficulty';
        let selectedDifficulty = 'easy';
        let highScores = loadHighScores();
        let highScore = highScores[selectedDifficulty] || 0;
        let lives = 3;
        let gameSpeed = 150;
        let gameLoop = null;
        let isPaused = false;
        let isRunning = false;
        let isGameOver = false;
        let doublePoints = false;
        let ghostMode = false;
        let shieldActive = false;
        let speedActive = false;
        let slowActive = false;
        
        // DOM elements
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const livesEl = document.getElementById('lives');
        const pauseOverlay = document.getElementById('pauseOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreEl = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const difficultyBtns = document.querySelectorAll('[data-speed]');

        function loadHighScores() {
            try {
                const saved = JSON.parse(localStorage.getItem(HIGH_SCORE_KEY) || '{}');
                return {
                    easy: Number(saved.easy) || 0,
                    medium: Number(saved.medium) || 0,
                    hard: Number(saved.hard) || 0,
                    nightmare: Number(saved.nightmare) || 0
                };
            } catch {
                return { easy: 0, medium: 0, hard: 0, nightmare: 0 };
            }
        }

        function saveHighScores() {
            localStorage.setItem(HIGH_SCORE_KEY, JSON.stringify(highScores));
        }

        function updateDifficultyUI() {
            difficultyBtns.forEach(btn => {
                const isActive = btn.dataset.difficulty === selectedDifficulty;
                btn.classList.toggle('active', isActive);
                btn.disabled = isRunning && !isGameOver;
            });
        }

        function setDifficulty(difficulty, speed) {
            selectedDifficulty = difficulty;
            gameSpeed = speed;
            highScore = highScores[selectedDifficulty] || 0;
            updateDifficultyUI();
            updateUI();
        }

        setDifficulty(selectedDifficulty, gameSpeed);
        
        // Powerup types
        const POWERUP_TYPES = [
            { type: 'speed', color: '#00ffff', duration: 5000, symbol: '⚡' },
            { type: 'ghost', color: '#ff00ff', duration: 6000, symbol: '👻' },
            { type: 'double', color: '#ffff00', duration: 8000, symbol: '�2' },
            { type: 'slow', color: '#00ff88', duration: 5000, symbol: '🐢' },
            { type: 'shield', color: '#ff8800', duration: 8000, symbol: '🛡' }
        ];
        
        function getCurrentTickSpeed() {
            let currentSpeed = gameSpeed;
            if (slowActive) currentSpeed *= 1.5;
            if (speedActive) currentSpeed *= 0.5;
            return Math.max(30, Math.round(currentSpeed));
        }

        function restartGameLoop() {
            if (!isRunning || isPaused || isGameOver) return;
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameStep, getCurrentTickSpeed());
        }

        function clearTemporaryEffects() {
            doublePoints = false;
            ghostMode = false;
            shieldActive = false;
            speedActive = false;
            slowActive = false;
        }

        function initGame() {
            snake = [
                { x: 10, y: 15 },
                { x: 9, y: 15 },
                { x: 8, y: 15 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            spawnFood();
            powerups = [];
            score = 0;
            lives = 3;
            clearTemporaryEffects();
            isPaused = false;
            isGameOver = false;
            updateUI();
            gameOverOverlay.classList.remove('visible');
            pauseOverlay.classList.remove('visible');
        }
        
        function spawnFood() {
            let valid = false;
            while (!valid) {
                food.x = Math.floor(Math.random() * TILE_COUNT);
                food.y = Math.floor(Math.random() * TILE_COUNT);
                valid = !snake.some(seg => seg.x === food.x && seg.y === food.y);
            }
        }
        
        function spawnPowerup() {
            if (Math.random() > 0.15) return; // 15% chance
            
            let valid = false;
            let x, y;
            let attempts = 0;
            while (!valid && attempts < 50) {
                x = Math.floor(Math.random() * TILE_COUNT);
                y = Math.floor(Math.random() * TILE_COUNT);
                valid = !snake.some(seg => seg.x === x && seg.y === y) &&
                        !(food.x === x && food.y === y) &&
                        !powerups.some(p => p.x === x && p.y === y);
                attempts++;
            }
            
            if (valid) {
                const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
                powerups.push({
                    x, y,
                    ...type,
                    spawnTime: Date.now()
                });
            }
        }
        
        function update() {
            direction = { ...nextDirection };
            
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
            
            // Wall collision
            if (head.x < 0 || head.x >= TILE_COUNT || head.y < 0 || head.y >= TILE_COUNT) {
                handleDeath();
                return;
            }
            
            // Self collision (unless ghost mode)
            if (!ghostMode && snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                handleDeath();
                return;
            }
            
            snake.unshift(head);
            
            // Check powerup collision
            const powerupIndex = powerups.findIndex(p => p.x === head.x && p.y === head.y);
            if (powerupIndex !== -1) {
                const powerup = powerups[powerupIndex];
                activatePowerup(powerup);
                powerups.splice(powerupIndex, 1);
                playSound('powerup');
            }
            
            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                const points = doublePoints ? 20 : 10;
                score += points;
                playSound('eat');
                spawnFood();
                
                if (score > highScore) {
                    highScore = score;
                    highScores[selectedDifficulty] = highScore;
                    saveHighScores();
                }
                
                spawnPowerup();
            } else {
                snake.pop();
            }
            
            // Clean up expired powerups
            const now = Date.now();
            powerups = powerups.filter(p => now - p.spawnTime < p.duration);
            
            // Reset temporary effects
            let speedChanged = false;
            if (doublePoints && now - doublePoints.startTime > doublePoints.duration) {
                doublePoints = false;
            }
            if (ghostMode && now - ghostMode.startTime > ghostMode.duration) {
                ghostMode = false;
            }
            if (shieldActive && now - shieldActive.startTime > shieldActive.duration) {
                shieldActive = false;
            }
            if (speedActive && now - speedActive.startTime > speedActive.duration) {
                speedActive = false;
                speedChanged = true;
            }
            if (slowActive && now - slowActive.startTime > slowActive.duration) {
                slowActive = false;
                speedChanged = true;
            }
            if (speedChanged) restartGameLoop();
            
            updateUI();
        }
        
        function activatePowerup(powerup) {
            const now = Date.now();
            let speedChanged = false;

            switch(powerup.type) {
                case 'speed':
                    speedActive = { startTime: now, duration: powerup.duration };
                    slowActive = false;
                    speedChanged = true;
                    break;
                case 'ghost':
                    ghostMode = { startTime: now, duration: powerup.duration };
                    break;
                case 'double':
                    doublePoints = { startTime: now, duration: powerup.duration };
                    break;
                case 'slow':
                    slowActive = { startTime: now, duration: powerup.duration };
                    speedActive = false;
                    speedChanged = true;
                    break;
                case 'shield':
                    shieldActive = { startTime: now, duration: powerup.duration };
                    break;
            }

            if (speedChanged) restartGameLoop();
        }
        
        function handleDeath() {
            if (shieldActive) {
                shieldActive = false;
                // Remove tail segment as penalty
                snake.pop();
                playSound('powerup');
                return;
            }
            
            playSound('die');
            lives--;
            
            if (lives <= 0) {
                gameOver();
            } else {
                // Reset snake position
                snake = [
                    { x: 10, y: 15 },
                    { x: 9, y: 15 },
                    { x: 8, y: 15 }
                ];
                direction = { x: 1, y: 0 };
                nextDirection = { x: 1, y: 0 };
                powerups = [];
                clearTemporaryEffects();
                restartGameLoop();
                updateUI();
            }
        }
        
        function gameOver() {
            playSound('gameover');
            isRunning = false;
            isGameOver = true;
            clearInterval(gameLoop);
            updateDifficultyUI();
            finalScoreEl.textContent = score;
            gameOverOverlay.classList.add('visible');
            startBtn.textContent = 'Start';
        }
        
        function updateUI() {
            scoreEl.textContent = score;
            highScoreEl.textContent = highScore;
            
            let hearts = '';
            for (let i = 0; i < lives; i++) hearts += '❤️';
            livesEl.textContent = hearts;
        }
        
        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid
            ctx.strokeStyle = 'rgba(255, 0, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= TILE_COUNT; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }
            
            // Draw powerups
            const now = Date.now();
            powerups.forEach(p => {
                const alpha = 1 - (now - p.spawnTime) / p.duration;
                ctx.globalAlpha = alpha;
                
                // Glow
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.color;
                
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x * GRID_SIZE + GRID_SIZE/2, p.y * GRID_SIZE + GRID_SIZE/2, GRID_SIZE/2 - 2, 0, Math.PI * 2);
                ctx.fill();
                
                // Symbol
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#000';
                ctx.font = '12px Orbitron';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(p.symbol, p.x * GRID_SIZE + GRID_SIZE/2, p.y * GRID_SIZE + GRID_SIZE/2);
            });
            ctx.globalAlpha = 1;
            
            // Draw food
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ff00ff';
            ctx.fillStyle = '#ff00ff';
            ctx.beginPath();
            ctx.arc(food.x * GRID_SIZE + GRID_SIZE/2, food.y * GRID_SIZE + GRID_SIZE/2, GRID_SIZE/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Draw snake
            snake.forEach((seg, i) => {
                const isHead = i === 0;
                const alpha = isHead ? 1 : 0.7 - (i / snake.length) * 0.3;
                
                // Glow for head
                if (isHead) {
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#00ff88';
                } else {
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = 'rgba(0, 255, 136, 0.5)';
                }
                
                // Color changes based on effects
                let color = '#00ff88';
                if (ghostMode) color = '#ff00ff';
                if (shieldActive) color = '#ff8800';
                if (speedActive) color = '#00ffff';
                if (slowActive) color = '#00ff88';
                if (doublePoints) color = '#ffff00';
                
                ctx.globalAlpha = ghostMode ? 0.4 : alpha;
                ctx.fillStyle = color;
                
                const size = isHead ? GRID_SIZE - 2 : GRID_SIZE - 4;
                const offset = isHead ? 1 : 2;
                
                ctx.fillRect(seg.x * GRID_SIZE + offset, seg.y * GRID_SIZE + offset, size, size);
                
                // Eyes for head
                if (isHead && !ghostMode) {
                    ctx.fillStyle = '#000';
                    const eyeSize = 3;
                    const eyeOffset = 5;
                    
                    if (direction.x === 1) {
                        ctx.fillRect(seg.x * GRID_SIZE + GRID_SIZE - eyeOffset - eyeSize, seg.y * GRID_SIZE + eyeOffset, eyeSize, eyeSize);
                        ctx.fillRect(seg.x * GRID_SIZE + GRID_SIZE - eyeOffset - eyeSize, seg.y * GRID_SIZE + GRID_SIZE - eyeOffset - eyeSize, eyeSize, eyeSize);
                    } else if (direction.x === -1) {
                        ctx.fillRect(seg.x * GRID_SIZE + eyeOffset, seg.y * GRID_SIZE + eyeOffset, eyeSize, eyeSize);
                        ctx.fillRect(seg.x * GRID_SIZE + eyeOffset, seg.y * GRID_SIZE + GRID_SIZE - eyeOffset - eyeSize, eyeSize, eyeSize);
                    } else if (direction.y === -1) {
                        ctx.fillRect(seg.x * GRID_SIZE + eyeOffset, seg.y * GRID_SIZE + eyeOffset, eyeSize, eyeSize);
                        ctx.fillRect(seg.x * GRID_SIZE + GRID_SIZE - eyeOffset - eyeSize, seg.y * GRID_SIZE + eyeOffset, eyeSize, eyeSize);
                    } else {
                        ctx.fillRect(seg.x * GRID_SIZE + eyeOffset, seg.y * GRID_SIZE + GRID_SIZE - eyeOffset - eyeSize, eyeSize, eyeSize);
                        ctx.fillRect(seg.x * GRID_SIZE + GRID_SIZE - eyeOffset - eyeSize, seg.y * GRID_SIZE + GRID_SIZE - eyeOffset - eyeSize, eyeSize, eyeSize);
                    }
                }
            });
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
            
            // Draw active effect indicators
            let effectY = 26;
            const effects = [
                { active: doublePoints, color: '#ffff00', label: '2X' },
                { active: ghostMode, color: '#ff00ff', label: 'GHOST' },
                { active: shieldActive, color: '#ff8800', label: 'SHIELD' },
                { active: speedActive, color: '#00ffff', label: 'SPEED' },
                { active: slowActive, color: '#00ff88', label: 'SLOW' }
            ];
            
            effects.forEach(e => {
                if (e.active) {
                    ctx.fillStyle = e.color;
                    ctx.font = 'bold 16px Orbitron';
                    ctx.textAlign = 'left';
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = e.color;
                    ctx.fillText(e.label, 14, effectY);
                    ctx.shadowBlur = 0;
                    effectY += 22;
                }
            });
        }
        
        function gameStep() {
            if (!isPaused && !isGameOver) {
                update();
                draw();
            }
        }
        
        function startGame() {
            initAudio();
            initGame();
            isRunning = true;
            isPaused = false;
            isGameOver = false;
            startBtn.textContent = 'Restart';
            updateDifficultyUI();

            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameStep, getCurrentTickSpeed());
        }
        
        function togglePause() {
            if (!isRunning || isGameOver) return;
            
            isPaused = !isPaused;
            pauseOverlay.classList.toggle('visible', isPaused);
        }
        
        // Event listeners
        startBtn.addEventListener('click', startGame);
        
        document.addEventListener('keydown', (e) => {
            initAudio();
            
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    e.preventDefault();
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    e.preventDefault();
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    e.preventDefault();
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    e.preventDefault();
                    break;
                case 'p':
                case 'P':
                    togglePause();
                    e.preventDefault();
                    break;
                case ' ':
                    if (!isRunning || isGameOver) startGame();
                    e.preventDefault();
                    break;
            }
        });
        
        difficultyBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (isRunning && !isGameOver) return;
                setDifficulty(btn.dataset.difficulty, parseInt(btn.dataset.speed, 10));
            });
        });

        // Touch Controls - D-Pad
        const touchBtns = document.querySelectorAll('.touch-btn[data-dir]');
        touchBtns.forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                initAudio();
                const dir = btn.dataset.dir;
                handleTouchDirection(dir);
            }, { passive: false });
            
            btn.addEventListener('click', (e) => {
                // Also handle click for testing on desktop
                initAudio();
                const dir = btn.dataset.dir;
                handleTouchDirection(dir);
            });
        });

        function handleTouchDirection(dir) {
            switch(dir) {
                case 'up':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'down':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'left':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'right':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }

        // Touch Controls - Swipe Gestures
        let touchStartX = 0;
        let touchStartY = 0;
        let touchStartTime = 0;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            initAudio();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchStartTime = Date.now();
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); // Prevent scrolling while playing
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            const touchDuration = Date.now() - touchStartTime;
            
            const deltaX = touchEndX - touchStartX;
            const deltaY = touchEndY - touchStartY;
            
            // Minimum swipe distance
            const minSwipe = 30;
            
            if (Math.abs(deltaX) < minSwipe && Math.abs(deltaY) < minSwipe) {
                // Tap - start game if not running
                if (!isRunning || isGameOver) {
                    startGame();
                }
                return;
            }
            
            // Determine swipe direction
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
                // Horizontal swipe
                if (deltaX > 0 && direction.x !== -1) {
                    nextDirection = { x: 1, y: 0 };
                } else if (deltaX < 0 && direction.x !== 1) {
                    nextDirection = { x: -1, y: 0 };
                }
            } else {
                // Vertical swipe
                if (deltaY < 0 && direction.y !== 1) {
                    nextDirection = { x: 0, y: -1 };
                } else if (deltaY > 0 && direction.y !== -1) {
                    nextDirection = { x: 0, y: 1 };
                }
            }
        }, { passive: false });

        // Double tap to pause
        let lastTapTime = 0;
        canvas.addEventListener('dblclick', (e) => {
            e.preventDefault();
            togglePause();
        });

        // Prevent default touch behaviors
        document.body.addEventListener('touchmove', (e) => {
            if (e.target.closest('.game-container') || e.target.closest('.touch-controls')) {
                e.preventDefault();
            }
        }, { passive: false });

        // Pause when app is backgrounded (mobile)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isRunning && !isPaused && !isGameOver) {
                togglePause();
            }
        });

        // Handle resize
        window.addEventListener('resize', () => {
            draw();
        });

        // Initial draw
        updateDifficultyUI();
        draw();
    </script>
</body>
</html>
